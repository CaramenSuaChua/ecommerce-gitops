
namespace: ecommerce

frontend:
  enabled: true
  replicaCount: 3
  image:
    repository: caramensuachua/ecommerce-frontend
    tag: fcaa81d
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: true
    className: nginx
    host: ecommerce.devopsedu.vn
