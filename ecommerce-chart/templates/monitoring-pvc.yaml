
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.monitoring.storage.pvcName }}
  namespace: ecommerce
spec:
  accessModes:
    - {{ .Values.monitoring.storage.accessModes }}
  resources:
    requests:
      storage: {{ .Values.monitoring.storage.requestCapacity }}
  storageClassName: {{ .Values.monitoring.storage.className }}
  